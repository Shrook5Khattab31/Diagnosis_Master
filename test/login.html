<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Diagnosis Master Login</title>

    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="page-container">
      <!-- LEFT SIDE (الصورة) -->
      <div class="left">
        <img class="logo" src="Logo.png" alt="" />
      </div>

      <!-- RIGHT SIDE -->
      <div class="right">
        <a href="/">
          <img class="back-image" src="back.png" alt="" />
        </a>

        <div class="signup-card">
          <div class="signup-icon">
            <i class="fa-regular fa-user"></i>
          </div>

          <h2>Sign Up</h2>

          <label
            ><i class="fa-regular fa-user"></i>&nbsp;<b>Username:</b></label
          >

          <div class="input-box">
            <input type="text" placeholder="Username" />
          </div>

          <label><i class="fa-solid fa-envelope"></i>&nbsp;<b>Email:</b></label>

          <div class="input-box">
            <input type="email" placeholder="Email" />
          </div>

           <label><i class="fa-solid fa-lock"></i>&nbsp;<b>Password:</b></label>

          <div class="input-box">
            <input type="password" placeholder="Password" />
          </div>

           <label><i class="fa-solid fa-lock"></i>&nbsp;<b>Confirm Password:</b></label>

          <div class="input-box">
            <input type="password" placeholder="Confirm Password" />
          </div>

          <div class="select-group">
        <select>
            <option>Major</option>
            <option>physical therapy</option>
            <option>Dentistry</option>
            <option>Pharmacy</option>
        </select>

        <select>
            <option>Level</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
        </select>
    </div>
<br>

          <button class="btn-signup">Sign Up</button>


        </div>
      </div>
    </div>
  </body>
</html>
